version: v1.0
name: "Semaphore pipeline for alfred-margaret"

agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

# Automatically cancel jobs that are already running for all branches but master
auto_cancel:
  running:
    when: "branch != 'master'"

# This configuration applies to all blocks.
global_job_config:
  # List secrets that are to be available in all jobs.
  # Secrets can be created using the web interface, or by using the `sem` tool.
  secrets:
    # Keys needed to access our cachix cache.
    - name: "cachix-channable-public"

blocks:
  - name: Stack
    task:
      prologue:
        commands:
          # Checkout out the repository
          - checkout
          - git log --max-count 1 --oneline --no-decorate
          # Set up /nix with correct permissions
          - sudo mkdir /nix
          - sudo chown semaphore:semaphore /nix
          # Restore any nix cache that we can find
          - cache restore nix-store-
          # Install Nix
          - curl -o install-nix-2.24.12 https://releases.nixos.org/nix/nix-2.24.12/install
          - sha256sum --check .semaphore/install-nix.sha256

          - sh ./install-nix-2.24.12 --no-daemon
          # Enable `nix-command` feature, which `nix build` needs to build
          - sudo mkdir /etc/nix
          - echo 'experimental-features = nix-command' | sudo tee -a /etc/nix/nix.conf

          - source "$HOME/.nix-profile/etc/profile.d/nix.sh"
          # Configure cachix *without building the environment in default.nix*
          - nix shell -f nix/nixpkgs-pinned.nix cachix -c cachix use channable-public
          # Restore .stack-work and ~/.stack from cache for faster builds
          - cache restore home-stack-$SEMAPHORE_GIT_BRANCH
          - cache restore stack-work-$SEMAPHORE_GIT_BRANCH

      jobs:
        - name: Test alfred-margaret
          commands:
            - nix shell -f default.nix -c stack test alfred-margaret:test-suite

      epilogue:
        commands:
          # Fill caches
          - cache store home-stack-$SEMAPHORE_GIT_BRANCH ~/.stack
          - cache store stack-work-$SEMAPHORE_GIT_BRANCH .stack-work
          # Push the Nix environment and all of its requisites to the
          # `channable-public` Cachix cache.
          - nix shell -f nix/nixpkgs-pinned.nix cachix -c ./.semaphore/push-to-cachix.sh
          # Store a copy of the nix store. This will be refreshed daily, which
          # is more than sufficient for this repo. Semaphore's cache is faster
          # than Cachix.
          - "cache store nix-store-$(date -u -Idate) /nix"

  - name: Cabal matrix
    task:
      prologue:
        commands:
          - checkout
          - git log --max-count 1 --oneline --no-decorate
          # Set up /nix with correct permissions
          - sudo mkdir /nix
          - sudo chown semaphore:semaphore /nix
          - cache restore nix-store-
          # Install Nix
          - curl -o install-nix-2.24.12 https://releases.nixos.org/nix/nix-2.24.12/install
          - sha256sum --check .semaphore/install-nix.sha256
          - sh ./install-nix-2.24.12 --no-daemon
          - sudo mkdir /etc/nix
          - echo 'experimental-features = nix-command' | sudo tee -a /etc/nix/nix.conf
          - source "$HOME/.nix-profile/etc/profile.d/nix.sh"
          - nix shell -f nix/nixpkgs-pinned.nix cachix -c cachix use channable-public

      jobs:
        - name: Build alfred-margaret on
          matrix:
            - env_var: GHC_VERSION
              values: ["ghc96", "ghc98", "ghc910", "ghc912", "ghc914"]
          commands:
            - nix-shell --argstr ghcVersion "$GHC_VERSION" --arg environment '"shell"' --run 'export LANG=C.UTF-8 LC_ALL=C.UTF-8 && cabal v2-update && cabal v2-test alfred-margaret:test-suite'

      epilogue:
        commands:
          # Push the Nix environment and all of its requisites to the
          # `channable-public` Cachix cache.
          - nix shell -f nix/nixpkgs-pinned.nix cachix -c ./.semaphore/push-to-cachix.sh
          - "cache store nix-store-$GHC_VERSION-$(date -u -Idate) /nix"
